<script language="Javascript">
    function capLock(e){
     kc = e.keyCode?e.keyCode:e.which;
     sk = e.shiftKey?e.shiftKey:((kc == 16)?true:false);
     if(((kc >= 65 && kc <= 90) && !sk)||((kc >= 97 && kc <= 122) && sk))
      document.getElementById('divMayus').style.visibility = 'visible';
     else
      document.getElementById('divMayus').style.visibility = 'hidden';
    }
    </script>

<script>
    function file_encrypt(dtstmp, myid){
            $.post('file_encrypt', {dtstmp:dtstmp, myid:myid}, function(data, status){

                $("#public_key").val(data);
                var secretMessage = $("#pwd").val();
                // cipher text with rsa public key
                var encrypted = publicKey.encrypt(secretMessage, "RSA-OAEP", {
                    md: forge.md.sha256.create(),
                    mgf1: forge.mgf1.create()
                });
                var base64 = forge.util.encode64(encrypted);
                var a = $("#pwd").val(base64);
            });
        }
